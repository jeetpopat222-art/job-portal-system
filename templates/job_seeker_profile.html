<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Profile</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }

        .container{
            width: 100%;
            max-width: 700px;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1{
            margin-bottom: 10px;
            color: #111827;
        }

        p{
            margin-bottom: 30px;
            color: #6b7280;
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input,
        textarea{
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
        }

        textarea{
            resize: none;
            height: 120px;
        }

        input:focus,
        textarea:focus{
            outline: none;
            border-color: #2563eb;
        }

        button{
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background-color: #1d4ed8;
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>Complete Your Profile</h1>

        <p>
            Fill in your professional details so employers can know more about you.
        </p>

        <form action="/job_seeker_profile" method="POST">

            <input 
                type="text"
                name="full_name"
                placeholder="Enter Full Name"
                required
            >

            <textarea
                name="skills"
                placeholder="Enter Your Skills by coma (Python, Flask, SQL, etc.)"
                required
            ></textarea>

            <textarea
                name="education"
                placeholder="Enter Your Education Details"
                required
            ></textarea>

            <input
                type="text"
                name="resume"
                placeholder="Paste Resume Link or File Path"
                required
            >

            <button type="submit">
                Save Profile
            </button>

        </form>

    </div>

</body>
</html>
