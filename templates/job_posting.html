<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Job Posting</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .container{
            width: 100%;
            max-width: 800px;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1{
            font-size: 36px;
            margin-bottom: 10px;
            color: #111827;
        }

        .subtitle{
            color: #6b7280;
            margin-bottom: 35px;
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        input,
        textarea,
        select{
            width: 100%;
            padding: 15px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
        }

        textarea{
            resize: none;
            height: 150px;
        }

        input:focus,
        textarea:focus,
        select:focus{
            outline: none;
            border-color: #2563eb;
        }

        .submit-btn{
            border: none;
            background-color: #2563eb;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover{
            background-color: #1d4ed8;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Create Job Posting</h1>

        <p class="subtitle">
            Post a new opportunity and start hiring talented candidates.
        </p>

        <form action="/create_job" method="POST">

            <input
                type="text"
                name="title"
                placeholder="Job Title"
                required
            >

            <textarea
                name="description"
                placeholder="Describe the role, responsibilities, requirements, etc."
                required
            ></textarea>

            <input
                type="number"
                name="salary"
                placeholder="Salary"
                required
            >

            <input
                type="text"
                name="location"
                placeholder="Job Location"
                required
            >

            <button type="submit" class="submit-btn">
                Publish Job
            </button>

        </form>

    </div>

</body>
</html>
