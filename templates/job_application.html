<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Jobs</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #f3f4f6;
            padding: 40px;
        }

        h1{
            margin-bottom: 30px;
            color: #111827;
        }

        .jobs-container{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
            gap: 25px;
        }

        .job-card{
            background-color: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .job-card h2{
            margin-bottom: 10px;
            color: #2563eb;
        }

        .job-card p{
            margin-bottom: 12px;
            color: #374151;
            line-height: 1.6;
        }

        .apply-btn{
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            background-color: #2563eb;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .applied-msg {
            display: inline-block;
            margin-top: 10px;
            color: #047857;
            background-color: #d1fae5;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 600;
        }

    </style>

</head>
<body>

    <h1>Available Jobs</h1>

    <div class="jobs-container">

        {% for job in jobs %}

        <div class="job-card">

            <h2>{{ job.title }}</h2>

            <p>
                <strong>Description:</strong>
                {{ job.description }}
            </p>

            <p>
                <strong>Salary:</strong>
                ₹{{ job.salary }}
            </p>

            <p>
                <strong>Location:</strong>
                {{ job.location }}
            </p>

            <form action="/application" method="POST">
                <input type="hidden" name="job_id" value="{{ job.id }}">
                <button type="submit" class="apply-btn">
                    Apply Now
                </button>
            </form>

        </div>

        {% endfor %}

    </div>

</body>
</html>
