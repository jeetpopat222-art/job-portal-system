<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Profile</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .container{
            width: 100%;
            max-width: 750px;
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1{
            font-size: 36px;
            margin-bottom: 10px;
            color: #111827;
        }

        .subtitle{
            color: #6b7280;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        input,
        textarea{
            width: 100%;
            padding: 15px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
        }

        textarea{
            resize: none;
            height: 140px;
        }

        input:focus,
        textarea:focus{
            outline: none;
            border-color: #2563eb;
        }

        .save-btn{
            border: none;
            background-color: #2563eb;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .save-btn:hover{
            background-color: #1d4ed8;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Complete Company Profile</h1>

        <p class="subtitle">
            Add your company details so job seekers can know more about your organization.
        </p>

        <form action="/employer_profile" method="POST">

            <input
                type="text"
                name="company_name"
                placeholder="Enter Company Name"
                required
            >

            <textarea
                name="company_description"
                placeholder="Describe your company, work culture, goals, etc."
                required
            ></textarea>

            <input
                type="url"
                name="website"
                placeholder="Enter Company Website"
                required
            >

            <button type="submit" class="save-btn">
                Save Company Profile
            </button>

        </form>

    </div>

</body>
</html>
